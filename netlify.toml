[build]
  base    = "web-frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  REACT_APP_API_BASE = "https://streamscore-backend-production.up.railway.app"

# Required for React single-page app: serve index.html for all routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
